proxy_cache_path /var/cache/nginx/prx_example_com levels=1:2 keys_zone=prx_example_com:10m inactive=10m max_size=500m use_temp_path=off;
# Generated by srv-panel — do not edit manually
# Reverse proxy: example.com → http://127.0.0.1:3000

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        try_files $uri =404;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_cache            prx_example_com;
        proxy_cache_valid      200 301 302 10m;
        proxy_cache_valid      any 1m;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;
        proxy_cache_bypass     $http_pragma $http_authorization;
        proxy_no_cache         $http_pragma $http_authorization;
        add_header             X-Cache-Status $upstream_cache_status;
    }
}
