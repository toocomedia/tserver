<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VPS Control Panel login">
  <meta name="csrf-token" content="{{ csrf_token(request) }}">
  <title>Login — VPS Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components/buttons.css">
  <link rel="stylesheet" href="/static/css/components/forms.css">
  <link rel="stylesheet" href="/static/css/components/sections.css">
  <link rel="stylesheet" href="/static/css/components/alerts.css">
  <link rel="stylesheet" href="/static/css/utils.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-surface);
      padding: var(--space-xl);
    }
    .login-page__card {
      width: 100%;
      max-width: 380px;
    }
    .login-page__brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      justify-content: center;
    }
    .login-page__brand span {
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: var(--font-body);
    }
    .login-page__brand svg {
      stroke: var(--color-sidebar);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-page__card">
      <div class="login-page__brand">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
        <span>SRV Panel</span>
      </div>

      <div class="panel">
        <div class="panel__header">
          <h3>Sign in</h3>
        </div>
        <div class="panel__body">
          {% if error %}
          <div class="alert alert--danger mb-lg" role="alert">{{ error }}</div>
          {% endif %}

          <form method="post" action="/login" class="form" id="login-form" autocomplete="on"{% if locked %} data-locked="1"{% endif %}>
            {% include "partials/csrf_field.html" %}
            <input type="hidden" name="next" value="{{ next or '/' }}">

            <div class="form-group">
              <label class="form-label" for="username">Username</label>
              <input
                class="form-input{% if error %} form-input--error{% endif %}"
                type="text"
                id="username"
                name="username"
                value="{{ username or '' }}"
                required
                {% if not locked %}autofocus{% endif %}
                autocomplete="username"
                autocapitalize="none"
                spellcheck="false"
                {% if locked %}disabled{% endif %}
              >
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input
                class="form-input{% if error %} form-input--error{% endif %}"
                type="password"
                id="password"
                name="password"
                required
                autocomplete="current-password"
                {% if locked %}disabled{% endif %}
              >
            </div>

            <button
              type="submit"
              id="login-submit"
              class="btn btn--primary"
              style="width:100%;margin-top:var(--space-md);"
              {% if locked %}disabled aria-disabled="true"{% endif %}
            >
              {% if locked %}Try again later{% else %}Sign in{% endif %}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var form = document.getElementById("login-form");
      var btn = document.getElementById("login-submit");
      if (!form || !btn) return;

      // Rate-limit / lockout page: never allow another POST.
      if (form.getAttribute("data-locked") === "1") {
        form.addEventListener("submit", function (e) {
          e.preventDefault();
        });
        return;
      }

      // First submit only — extra clicks must not fire more POSTs.
      form.addEventListener("submit", function (e) {
        if (form.getAttribute("data-submitting") === "1") {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        form.setAttribute("data-submitting", "1");
        btn.disabled = true;
        btn.setAttribute("aria-disabled", "true");
        btn.textContent = "Signing in…";
      });

      // Catch double-clicks before a second submit is queued.
      btn.addEventListener("click", function (e) {
        if (form.getAttribute("data-submitting") === "1" || btn.disabled) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      });
    })();
  </script>
</body>
</html>
