<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VPS Control Panel — manage domains, DNS, SSL and reverse proxies.">
  <title>{% block title %}VPS Panel{% endblock %}</title>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components/buttons.css">
  <link rel="stylesheet" href="/static/css/components/tables.css">
  <link rel="stylesheet" href="/static/css/components/badges.css">
  <link rel="stylesheet" href="/static/css/components/forms.css">
  <link rel="stylesheet" href="/static/css/components/sections.css">
  <link rel="stylesheet" href="/static/css/components/modals.css">
  <link rel="stylesheet" href="/static/css/components/alerts.css">
  <link rel="stylesheet" href="/static/css/utils.css">

  {% block head %}{% endblock %}
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  {% include "partials/sidebar.html" %}

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    {% include "partials/topbar.html" %}

    <!-- CONTENT -->
    <main class="content" id="main-content">
      <div class="content__inner">
        {# Flash-style messages come from query params / page templates (no Flask) #}
        {% block content %}{% endblock %}
      </div>
    </main>

  </div><!-- /.main -->

</div><!-- /.app -->

<!-- CONFIRM MODAL (global, reused everywhere) -->
<div id="confirm-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div class="modal">
    <div class="modal__header">
      <h2 id="confirm-title">Confirm Action</h2>
      <button class="btn btn--ghost btn--icon" onclick="closeModal('confirm-modal')" aria-label="Close">✕</button>
    </div>
    <div class="modal__body">
      <p id="confirm-message">Are you sure?</p>
    </div>
    <div class="modal__footer">
      <button type="button" class="btn btn--secondary" onclick="closeModal('confirm-modal')">Cancel</button>
      <button type="button" class="btn btn--danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container" role="status" aria-live="polite"></div>

<!-- JS -->
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
