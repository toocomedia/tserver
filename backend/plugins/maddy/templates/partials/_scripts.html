<script>
// Parse accounts from Jinja into JS for easy filtering
const allAccounts = {{ accounts | tojson }};
const webmailAvailable = {{ webmail_available | tojson }};
let currentDomain = "";
let currentDomainIp = "{{ server_ip }}";

function getCsrfToken() {
  const el = document.querySelector('input[name="csrf_token"]');
  return el ? el.value : '';
}

// ---------------------------------------------------------------------------
// Sidebar Active State
// ---------------------------------------------------------------------------
function setSidebarActiveText(text) {
  document.querySelectorAll('.split-sidebar__item').forEach(el => {
    if (el.innerText.trim() === text) {
      el.classList.add('active');
    } else {
      el.classList.remove('active');
    }
  });
}

// ---------------------------------------------------------------------------
// Add Domain UI Toggle
// ---------------------------------------------------------------------------
function toggleDomainInputType() {
  const type = document.querySelector('input[name="domain_type"]:checked').value;
  const selectWrapper = document.getElementById('domain-select-wrapper');
  const inputWrapper  = document.getElementById('domain-input-wrapper');
  const hintText      = document.getElementById('domain-hint-text');
  
  if (type === 'panel') {
    selectWrapper.style.display = 'block';
    inputWrapper.style.display  = 'none';
    hintText.innerText = "Select a domain hosted on this panel — MX, A, SPF, and DMARC records will be created automatically in PowerDNS.";
  } else {
    selectWrapper.style.display = 'none';
    inputWrapper.style.display  = 'block';
    hintText.innerText = "Enter an external domain (e.g. from Cloudflare). Local PowerDNS records will be skipped.";
  }
}

// ---------------------------------------------------------------------------
// Domain select → auto-fill hidden IP
// ---------------------------------------------------------------------------
function onDomainSelect(selectEl) {
  const ip = selectEl.selectedOptions[0]?.dataset?.ip || '';
  if (ip) {
    currentDomainIp = ip;
    const ipField = document.getElementById('add-domain-ip');
    if (ipField) ipField.value = ip;
  }
}

// ---------------------------------------------------------------------------
// Add domain (AJAX)
// ---------------------------------------------------------------------------
async function handleAddDomain() {
  const form     = document.getElementById('add-domain-form');
  const formData = new FormData(form);
  const result   = document.getElementById('add-domain-result');

  const type = formData.get('domain_type');
  let domain = "";
  if (type === 'panel') {
    domain = formData.get('domain_select');
  } else {
    domain = formData.get('domain_custom');
  }

  if (!domain || !domain.trim()) {
    result.style.display = 'block';
    result.className = 'text-small text-danger';
    result.innerText = 'Please provide a domain name.';
    return;
  }

  // The backend expects 'domain', so we construct a new FormData
  const payload = new FormData();
  payload.append('csrf_token', formData.get('csrf_token'));
  payload.append('domain', domain.trim());
  payload.append('server_ip', formData.get('server_ip'));

  result.style.display = 'block';
  result.className = 'text-small text-muted';
  result.innerText = 'Adding domain…';

  try {
    const res  = await fetch('/plugins/maddy/api/domains/add', { method: 'POST', body: payload });
    const data = await res.json();
    if (res.ok) {
      result.className = 'text-small text-accent';
      result.innerText = data.message || '✅ Domain added successfully.';
      setTimeout(() => location.reload(), 1200);
    } else {
      result.className = 'text-small text-danger';
      result.innerText = data.detail || 'Failed to add domain.';
    }
  } catch (err) {
    result.className = 'text-small text-danger';
    result.innerText = 'Network error: ' + err.message;
  }
}

// ---------------------------------------------------------------------------
// Delete domain — AJAX (fixes [object Object] from plain form POST)
// ---------------------------------------------------------------------------
function confirmDeleteDomain(domain) {
  // If no domain provided, use the current active one
  domain = domain || currentDomain;
  document.getElementById('delete-domain-name').innerText = domain;
  document.getElementById('delete-domain-input').value    = domain;
  openModal('delete-domain-modal');
}

async function executeDeleteDomain() {
  const domain = document.getElementById('delete-domain-input').value;
  const formData = new FormData();
  formData.append('csrf_token', getCsrfToken());
  formData.append('domain', domain);

  // Show spinner in button
  const btn = document.querySelector('#delete-domain-modal .btn--danger');
  btn.disabled = true;
  btn.innerText = 'Deleting…';

  try {
    const res  = await fetch('/plugins/maddy/api/domains/delete', { method: 'POST', body: formData });
    const data = await res.json();
    closeModal('delete-domain-modal');
    if (res.ok) {
      location.reload();
    } else {
      alert('Delete failed: ' + (data.detail || JSON.stringify(data)));
    }
  } catch (err) {
    closeModal('delete-domain-modal');
    alert('Network error: ' + err.message);
  }
}

// ---------------------------------------------------------------------------
// Views
// ---------------------------------------------------------------------------
function openDomainDetail(domain, serverIp) {
  currentDomain   = domain;
  currentDomainIp = serverIp || currentDomainIp;
  setSidebarActiveText(domain);

  document.getElementById('add-domain-view').style.display = 'none';
  document.getElementById('domain-detail-view').style.display = 'block';

  document.getElementById('detail-domain-name').innerText        = domain;
  document.getElementById('dns-domain-input').value              = domain;
  document.getElementById('ssl-domain-input').value              = domain;
  document.getElementById('dns-server-ip').value                 = currentDomainIp;
  document.getElementById('mail-subdomain-preview').innerText    = 'mail.' + domain;
  document.getElementById('imap-host-preview').innerText         = 'mail.' + domain;
  document.getElementById('smtp-host-preview').innerText         = 'mail.' + domain;
  document.getElementById('username-example-preview').innerText  = 'user@' + domain;

  // Fill DNS Cheat Sheet
  document.getElementById('dns-table-a').innerText   = currentDomainIp;
  document.getElementById('dns-table-mx').innerText  = 'mail.' + domain;
  document.getElementById('dns-table-spf').innerText = 'v=spf1 mx ip4:' + currentDomainIp + ' ~all';

  renderAccountsList();
}

function openAddDomain() {
  setSidebarActiveText('+ Add Domain');
  document.getElementById('domain-detail-view').style.display = 'none';
  document.getElementById('add-domain-view').style.display = 'block';
}

// ---------------------------------------------------------------------------
// Inner Tab Switching
// ---------------------------------------------------------------------------
function switchInnerTab(btnEl) {
  // Reset buttons
  document.querySelectorAll('.tabs-nav button').forEach(btn => btn.classList.remove('active'));
  btnEl.classList.add('active');

  // Hide all inner tab contents
  document.querySelectorAll('.inner-tab-content').forEach(content => {
    content.style.display = 'none';
  });

  // Show selected
  const tabId = btnEl.getAttribute('data-inner-tab');
  if (tabId) {
    document.getElementById(tabId).style.display = 'block';
  }
}

// ---------------------------------------------------------------------------
// Accounts list (filtered by currentDomain)
// ---------------------------------------------------------------------------
function renderAccountsList() {
  const tbody    = document.getElementById('accounts-tbody');
  const emptyDiv = document.getElementById('accounts-empty');
  const table    = document.getElementById('accounts-table');
  tbody.innerHTML = '';

  const filtered = allAccounts.filter(a => a.email.endsWith('@' + currentDomain));

  if (filtered.length === 0) {
    emptyDiv.style.display = 'block';
    table.style.display    = 'none';
  } else {
    emptyDiv.style.display = 'none';
    table.style.display    = 'table';
    filtered.forEach(acc => {
      const tr = document.createElement('tr');
      const addressCell = document.createElement('td');
      const address = document.createElement('strong');
      address.textContent = acc.email;
      addressCell.appendChild(address);

      const statusCell = document.createElement('td');
      statusCell.innerHTML = '<span class="badge badge--success">Active</span>';

      const actionsCell = document.createElement('td');
      actionsCell.style.textAlign = 'right';
      if (webmailAvailable) {
        const openButton = document.createElement('button');
        openButton.type = 'button';
        openButton.className = 'btn btn--secondary btn--sm';
        openButton.textContent = 'Open Webmail';
        openButton.style.marginRight = '0.5rem';
        openButton.addEventListener('click', () => openWebmail(acc.email));
        actionsCell.appendChild(openButton);
      }
      const deleteButton = document.createElement('button');
      deleteButton.type = 'button';
      deleteButton.className = 'btn btn--danger btn--sm';
      deleteButton.textContent = 'Delete';
      deleteButton.addEventListener('click', () => executeDeleteAccount(acc.email));
      actionsCell.appendChild(deleteButton);

      tr.append(addressCell, statusCell, actionsCell);
      tbody.appendChild(tr);
    });
  }
}

function openAddAccountModal() {
  document.getElementById('modal-domain-input').value = currentDomain;
  document.getElementById('domain-suffix-preview').innerText = '@' + currentDomain;
  document.getElementById('add-account-result').style.display = 'none';
  updateDomainSuffix();
  openModal('add-account-modal');
}

function updateDomainSuffix() {
  const username = document.getElementById('modal-username-input').value.replace(/@.*$/, '') || 'info';
  document.getElementById('full-email-preview').innerText = username + '@' + currentDomain;
}

// ---------------------------------------------------------------------------
// Accounts actions (AJAX)
// ---------------------------------------------------------------------------
function openWebmail(email) {
  const form = document.createElement('form');
  form.method = 'post';
  form.action = '/plugins/roundcube_webmail/api/launch';
  form.target = '_blank';
  form.style.display = 'none';

  const fields = { csrf_token: getCsrfToken(), email };
  Object.entries(fields).forEach(([name, value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();
  form.remove();
}

async function executeAddAccount() {
  const form = document.getElementById('add-account-form');
  const formData = new FormData(form);
  const resultDiv = document.getElementById('add-account-result');

  resultDiv.style.display = 'block';
  resultDiv.className = 'text-small text-muted';
  resultDiv.innerText = 'Creating mailbox…';

  try {
    const res = await fetch('/plugins/maddy/api/accounts/create', { method: 'POST', body: formData });
    const data = await res.json();
    if (res.ok) {
      resultDiv.className = 'text-small text-accent';
      resultDiv.innerText = 'Mailbox created successfully!';
      // Add to array and re-render
      allAccounts.push({ email: data.email });
      renderAccountsList();
      setTimeout(() => closeModal('add-account-modal'), 800);
      form.reset();
    } else {
      resultDiv.className = 'text-small text-danger';
      resultDiv.innerText = data.detail || 'Failed to create mailbox.';
    }
  } catch (err) {
    resultDiv.className = 'text-small text-danger';
    resultDiv.innerText = 'Network error: ' + err.message;
  }
}

async function executeDeleteAccount(email) {
  if (!confirm(`Delete mailbox ${email}?`)) return;

  const formData = new FormData();
  formData.append('csrf_token', getCsrfToken());
  formData.append('email', email);

  try {
    const res = await fetch('/plugins/maddy/api/accounts/delete', { method: 'POST', body: formData });
    const data = await res.json();
    if (res.ok) {
      // Remove from array and re-render
      const index = allAccounts.findIndex(a => a.email === email);
      if (index > -1) {
        allAccounts.splice(index, 1);
      }
      renderAccountsList();
    } else {
      alert('Delete failed: ' + (data.detail || 'Unknown error'));
    }
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}

// ---------------------------------------------------------------------------
// DNS actions (AJAX)
// ---------------------------------------------------------------------------
async function handleDnsAction(endpoint) {
  const formData  = new FormData(document.getElementById('dns-setup-form'));
  const resultDiv = document.getElementById('dns-result-message');

  resultDiv.style.display = 'block';
  resultDiv.className     = 'text-small text-muted';
  resultDiv.innerText     = 'Updating DNS records…';

  try {
    const res  = await fetch(endpoint, { method: 'POST', body: formData });
    const data = await res.json();
    if (res.ok) {
      resultDiv.className = 'text-small text-accent';
      resultDiv.innerText = data.message || '✅ DNS operation completed.';
    } else {
      resultDiv.className = 'text-small text-danger';
      resultDiv.innerText = data.detail || 'DNS operation failed.';
    }
  } catch (err) {
    resultDiv.className = 'text-small text-danger';
    resultDiv.innerText = 'Network error: ' + err.message;
  }
}

// ---------------------------------------------------------------------------
// SSL issue (AJAX)
// ---------------------------------------------------------------------------
async function issueMailSsl() {
  const formData  = new FormData(document.getElementById('ssl-setup-form'));
  const resultDiv = document.getElementById('ssl-result-message');

  resultDiv.style.display = 'block';
  resultDiv.className     = 'text-small text-muted';
  resultDiv.innerText     = "Requesting Let's Encrypt SSL… (may take up to 30 s)";

  try {
    const res  = await fetch('/plugins/maddy/api/ssl/issue', { method: 'POST', body: formData });
    const data = await res.json();
    if (res.ok) {
      resultDiv.className = 'text-small text-accent';
      resultDiv.innerText = data.message || '✅ SSL issued successfully.';
    } else {
      resultDiv.className = 'text-small text-danger';
      resultDiv.innerText = data.detail || 'SSL request failed.';
    }
  } catch (err) {
    resultDiv.className = 'text-small text-danger';
    resultDiv.innerText = 'Network error: ' + err.message;
  }
}

// ---------------------------------------------------------------------------
// Auto-Init on Load
// ---------------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
  const activeSidebarItem = document.querySelector('.split-sidebar__item.active');
  if (activeSidebarItem && activeSidebarItem.onclick) {
    activeSidebarItem.click();
  } else if (activeSidebarItem && activeSidebarItem.innerText.trim() === '+ Add Domain') {
    openAddDomain();
  }
});
</script>
