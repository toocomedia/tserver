<!-- ADD MAILBOX MODAL -->
<div id="add-account-modal" class="modal-backdrop hidden" role="dialog">
  <div class="modal" style="border-radius:0;">
    <div class="modal__header">
      <h2>Add Mailbox Account</h2>
      <button class="btn btn--ghost btn--icon" onclick="closeModal('add-account-modal')">✕</button>
    </div>
    <form method="post" action="/plugins/maddy/api/accounts/create">
      <div class="modal__body">
        <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">

        <div class="form-group mb-3">
          <label class="form-label">Mailbox Username</label>
          <div style="display:flex; align-items:center; border:1px solid var(--color-line); background:var(--color-bg);">
            <input
              type="text"
              name="username"
              id="modal-username-input"
              placeholder="info"
              required
              autocomplete="off"
              class="form-input"
              style="border:none; flex:1; outline:none;"
              oninput="updateDomainSuffix()"
            >
            <span
              id="domain-suffix-preview"
              style="padding:0 12px; font-weight:700; color:var(--color-muted); font-size:0.88rem; border-left:1px solid var(--color-line); background:var(--color-surface); height:36px; display:flex; align-items:center;"
            ></span>
          </div>
          <div class="form-hint mt-1">
            Full Address: <strong id="full-email-preview" class="text-accent"></strong>
          </div>
        </div>

        <!-- Domain passed as hidden field so the router can build full_email -->
        <input type="hidden" name="domain" id="modal-domain-input">

        <div class="form-group mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter mailbox password"
            required
            autocomplete="new-password"
            class="form-input"
            style="width:100%;"
          >
        </div>
      </div>
      <div class="modal__footer">
        <button type="button" class="btn btn--secondary" onclick="closeModal('add-account-modal')">Cancel</button>
        <button type="submit" class="btn btn--primary">Create Mailbox</button>
      </div>
    </form>
  </div>
</div>
