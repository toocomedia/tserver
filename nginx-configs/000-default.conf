# 000-default — drop-all default_server
# Catches any request for a domain not explicitly configured.
# Returns 444 (Nginx drops connection — no response sent to client).
# This prevents domain bleed-through to the panel or other sites.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Dummy self-signed cert — only needed to accept the TLS handshake
    # before returning 444. Generated by scripts/setup_nginx.sh.
    ssl_certificate     /etc/nginx/ssl/dummy.crt;
    ssl_certificate_key /etc/nginx/ssl/dummy.key;

    return 444;
}
