# panel.conf — VPS Control Panel UI
# Proxies to FastAPI on localhost:8000
#
# IP-only:   server_name YOUR_SERVER_IP;
# Domain:    server_name YOUR_SERVER_IP panel.example.com;
# Always include the public IP so http://IP/ works without DNS.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_SERVER_IP YOUR_PANEL_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        try_files $uri =404;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        # $http_host keeps non-default ports (e.g. :8080); $host strips them
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
